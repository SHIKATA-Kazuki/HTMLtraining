<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS/HTML 英単語タイピング</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #F0F2F8;
  --surface:  #FFFFFF;
  --border:   #E2E6F0;
  --text:     #1A1A2E;
  --muted:    #8892A4;
  --blue:     #4361EE;
  --green:    #06D6A0;
  --red:      #EF476F;
  --yellow:   #FFD166;
  --shadow:   0 4px 24px rgba(67,97,238,0.10);
  --shadow-lg:0 12px 48px rgba(67,97,238,0.16);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Top bar ── */
.topbar {
  width: 100%;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.site-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--blue);
}
.site-title span { color: var(--text); }

.topbar-stats {
  margin-left: auto;
  display: flex;
  gap: 24px;
}
.tstat { font-size: 13px; color: var(--muted); }
.tstat strong { color: var(--text); font-variant-numeric: tabular-nums; }

/* ── Category pills ── */
.cat-row {
  width: 100%;
  max-width: 680px;
  padding: 28px 20px 0;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.cat-pill {
  padding: 7px 16px;
  border-radius: 99px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Noto Sans JP', sans-serif;
}
.cat-pill:hover { border-color: var(--blue); color: var(--blue); }
.cat-pill.active {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}

/* ── Main area ── */
main {
  width: 100%;
  max-width: 680px;
  padding: 28px 20px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* ── Progress ── */
.progress-row {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--blue), #7B8FFF);
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
  width: 0%;
}
.progress-label { font-size: 13px; color: var(--muted); min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; }

/* ── Card stage ── */
.card-stage {
  width: 100%;
  perspective: 1000px;
  position: relative;
  height: 220px;
}

.card {
  width: 100%;
  height: 220px;
  background: var(--surface);
  border-radius: 20px;
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 32px;
  position: absolute;
  top: 0; left: 0;
  transition: transform 0.45s cubic-bezier(.4,0,.2,1), opacity 0.35s;
  will-change: transform, opacity;
  border: 1.5px solid var(--border);
}
.card.fly-out-right {
  transform: translateX(110%) rotate(8deg);
  opacity: 0;
}
.card.fly-out-wrong {
  transform: translateX(-60%) rotate(-6deg);
  opacity: 0;
}
.card.fly-in {
  animation: flyIn 0.4s cubic-bezier(.4,0,.2,1) both;
}
@keyframes flyIn {
  from { transform: translateY(40px) scale(0.96); opacity: 0; }
  to   { transform: none; opacity: 1; }
}

.card-category {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--blue);
  background: rgba(67,97,238,0.08);
  padding: 3px 10px;
  border-radius: 99px;
}
.card-hint {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -0.02em;
  color: var(--text);
  text-align: center;
  line-height: 1.2;
}
.card-hint.small { font-size: 22px; }
.card-sub {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}

/* shake on wrong */
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}
.card.shake { animation: shake 0.4s ease; }

/* glow on correct */
.card.correct-glow {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(6,214,160,0.25), var(--shadow-lg);
}

/* ── Input block ── */
.input-block {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.input-wrap {
  position: relative;
  width: 100%;
}
#answer {
  width: 100%;
  padding: 18px 52px 18px 20px;
  border: 2px solid var(--border);
  border-radius: 14px;
  background: var(--surface);
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  caret-color: var(--blue);
  letter-spacing: 0.04em;
}
#answer::placeholder { color: var(--muted); font-weight: 400; font-size: 16px; }
#answer:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(67,97,238,0.12); }
#answer.state-wrong { border-color: var(--red); box-shadow: 0 0 0 3px rgba(239,71,111,0.12); }
#answer.state-right { border-color: var(--green); box-shadow: 0 0 0 3px rgba(6,214,160,0.18); }

.enter-hint {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px 7px;
  pointer-events: none;
  font-family: 'JetBrains Mono', monospace;
}

/* typing char display */
.char-display {
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 3px;
  flex-wrap: wrap;
  min-height: 36px;
  align-items: center;
}
.ch {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  transition: color 0.1s;
  color: var(--muted);
  position: relative;
}
.ch.hit  { color: var(--blue); }
.ch.miss { color: var(--red); background: rgba(239,71,111,0.10); border-radius: 4px; }
.ch.cursor::after {
  content: '';
  position: absolute;
  left: 0; bottom: -2px;
  width: 100%; height: 2.5px;
  background: var(--blue);
  border-radius: 2px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Feedback toast ── */
.toast {
  position: fixed;
  top: 24px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--text);
  color: #fff;
  padding: 10px 22px;
  border-radius: 99px;
  font-size: 14px;
  font-weight: 700;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
  opacity: 0;
  z-index: 100;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.green { background: var(--green); color: var(--text); }
.toast.red   { background: var(--red); }

/* ── Stats row ── */
.stats-row {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.stat-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
}
.stat-card .val {
  font-size: 28px;
  font-weight: 900;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  display: block;
  line-height: 1;
}
.stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; display: block; }

/* ── Skip / hint row ── */
.action-row {
  width: 100%;
  display: flex;
  gap: 10px;
}
.action-btn {
  flex: 1;
  padding: 12px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.action-btn:hover { border-color: var(--blue); color: var(--blue); }
.action-btn.primary {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.action-btn.primary:hover { background: #3451d1; }

/* ── Complete screen ── */
.complete {
  display: none;
  width: 100%;
  background: var(--surface);
  border-radius: 20px;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-lg);
  padding: 40px 32px;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  text-align: center;
}
.complete.show { display: flex; }
.complete-emoji { font-size: 52px; }
.complete-title { font-size: 24px; font-weight: 900; }
.complete-sub { font-size: 14px; color: var(--muted); }
.complete-stats { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
.cs { text-align: center; }
.cs .v { font-size: 36px; font-weight: 900; display: block; line-height: 1; }
.cs .l { font-size: 12px; color: var(--muted); margin-top: 4px; display: block; }
.rank {
  padding: 8px 24px;
  border-radius: 99px;
  font-size: 14px;
  font-weight: 700;
}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="site-title">CSS/HTML <span>英単語タイピング</span></div>
  <div class="topbar-stats">
    <div class="tstat">正解数 <strong id="totalCorrect">0</strong></div>
    <div class="tstat">ベストWPM <strong id="bestWpm">—</strong></div>
  </div>
</div>

<!-- Category pills -->
<div class="cat-row" id="catRow">
  <button class="cat-pill active" data-cat="css-prop">CSSプロパティ</button>
  <button class="cat-pill" data-cat="css-val">CSS値・単位</button>
  <button class="cat-pill" data-cat="html">HTMLタグ</button>
  <button class="cat-pill" data-cat="selector">セレクタ</button>
  <button class="cat-pill" data-cat="mix">ミックス 🎲</button>
</div>

<main>

  <!-- Progress -->
  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
    <div class="progress-label" id="progLabel">0 / 0</div>
  </div>

  <!-- Card -->
  <div class="card-stage" id="cardStage">
    <div class="card fly-in" id="card">
      <div class="card-category" id="cardCat">—</div>
      <div class="card-hint" id="cardHint">読み込み中…</div>
      <div class="card-sub" id="cardSub"></div>
    </div>
  </div>

  <!-- Char display -->
  <div class="char-display" id="charDisplay"></div>

  <!-- Input -->
  <div class="input-block">
    <div class="input-wrap">
      <input type="text" id="answer" autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false"
             placeholder="英語で入力してください">
      <span class="enter-hint">Enter ↵</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><span class="val" id="sWpm">—</span><span class="lbl">WPM</span></div>
    <div class="stat-card"><span class="val" id="sAcc">—</span><span class="lbl">正解率</span></div>
    <div class="stat-card"><span class="val" id="sTime">0.0s</span><span class="lbl">経過時間</span></div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="action-btn" id="hintBtn">💡 ヒント表示</button>
    <button class="action-btn" id="skipBtn">スキップ ⏭</button>
    <button class="action-btn primary" id="nextSetBtn">次のセット →</button>
  </div>

  <!-- Complete -->
  <div class="complete" id="complete">
    <div class="complete-emoji" id="compEmoji">🎉</div>
    <div class="complete-title" id="compTitle">セット完了！</div>
    <div class="complete-sub" id="compSub"></div>
    <div class="complete-stats">
      <div class="cs"><span class="v" id="compWpm">—</span><span class="l">平均 WPM</span></div>
      <div class="cs"><span class="v" id="compAcc">—</span><span class="l">正解率</span></div>
      <div class="cs"><span class="v" id="compTime">—</span><span class="l">合計時間</span></div>
    </div>
    <div class="rank" id="compRank"></div>
    <button class="action-btn primary" id="restartBtn" style="max-width:200px">もう一度 ↺</button>
  </div>

</main>

      { ja: 'ルート要素',           en: ':root',               hint: ':ro○○' },
      { ja: '疑似要素・前',         en: '::before',            hint: '::be○○○○' },
      { ja: '疑似要素・後',         en: '::after',             hint: '::af○○○' },
      { ja: '否定',                 en: ':not()',              hint: ':no○()' },
      { ja: 'N番目の子',            en: ':nth-child()',        hint: ':nth-○○○○○()' },
      { ja: 'メディアクエリ',       en: '@media',              hint: '@me○○○' },
      { ja: 'キーフレーム定義',     en: '@keyframes',          hint: '@key○○○○○○' },
      { ja: '複数まとめて選択',     en: ':is()',               hint: ':i○()' },
      { ja: 'CSS変数定義',          en: '@layer',              hint: '@la○○○' },
      { ja: '全称選択',             en: '*',                   hint: '○' },
    ]
  }
};

// ── State ─────────────────────────────────────────────────────────────────
let cat = 'css-prop';
let queue = [];
let idx = 0;
let startTime = null;
let timerRaf = null;
let wrongCount = 0;
let correctCount = 0;
let totalCharsTyped = 0;
let sessionStartTime = null;
let allCorrect = 0;
let bestWpm = 0;
let hintShown = false;
let sessionWpms = [];
let sessionAccs = [];

// ── DOM ───────────────────────────────────────────────────────────────────
const card        = document.getElementById('card');
const cardCat     = document.getElementById('cardCat');
const cardHint    = document.getElementById('cardHint');
const cardSub     = document.getElementById('cardSub');
const charDisplay = document.getElementById('charDisplay');
const answer      = document.getElementById('answer');
const progFill    = document.getElementById('progFill');
const progLabel   = document.getElementById('progLabel');
const sWpm        = document.getElementById('sWpm');
const sAcc        = document.getElementById('sAcc');
const sTime       = document.getElementById('sTime');
const toast       = document.getElementById('toast');
const complete    = document.getElementById('complete');

// ── Category switch ───────────────────────────────────────────────────────
document.getElementById('catRow').addEventListener('click', e => {
  const btn = e.target.closest('.cat-pill');
  if (!btn) return;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  cat = btn.dataset.cat;
  initSession();
});

// ── Init ──────────────────────────────────────────────────────────────────
function initSession() {
  let items;
  if (cat === 'mix') {
    // pick 5 random from each category
    items = Object.values(BANKS).flatMap(b => shuffle([...b.items]).slice(0, 5));
  } else {
    items = [...BANKS[cat].items];
  }
  queue = shuffle(items);
  idx = 0; wrongCount = 0; correctCount = 0; totalCharsTyped = 0;
  sessionWpms = []; sessionAccs = [];
  startTime = null; sessionStartTime = null;
  cancelAnimationFrame(timerRaf);
  sWpm.textContent = '—'; sAcc.textContent = '—'; sTime.textContent = '0.0s';
  answer.value = ''; answer.className = '';
  hintShown = false;
  complete.classList.remove('show');
  updateProgress();
  showCard(true);
  answer.focus();
}

// ── Show card ─────────────────────────────────────────────────────────────
function showCard(initial = false) {
  if (idx >= queue.length) { showComplete(); return; }
  const item = queue[idx];

  // Decide category label
  let catLabel = '—';
  for (const [k, v] of Object.entries(BANKS)) {
    if (v.items.some(i => i.en === item.en)) { catLabel = v.label; break; }
  }

  cardCat.textContent = catLabel;
  cardHint.textContent = item.ja;
  cardHint.className = 'card-hint' + (item.ja.length > 8 ? ' small' : '');
  cardSub.textContent = '';
  hintShown = false;

  renderCharDisplay('');

  if (!initial) {
    card.classList.add('fly-in');
    card.addEventListener('animationend', () => card.classList.remove('fly-in'), { once: true });
  }
  card.classList.remove('correct-glow', 'shake');
}

// ── Char display ──────────────────────────────────────────────────────────
function renderCharDisplay(typed) {
  const target = queue[idx]?.en ?? '';
  charDisplay.innerHTML = '';
  target.split('').forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'ch';
    span.textContent = ch === ' ' ? '\u00a0' : ch;
    if (i < typed.length) {
      span.classList.add(typed[i] === ch ? 'hit' : 'miss');
    } else if (i === typed.length) {
      span.classList.add('cursor');
    }
    charDisplay.appendChild(span);
  });
}

// ── Input handler ─────────────────────────────────────────────────────────
answer.addEventListener('input', () => {
  if (idx >= queue.length) return;
  const typed = answer.value;
  if (!startTime && typed.length > 0) {
    startTime = Date.now();
    if (!sessionStartTime) sessionStartTime = startTime;
    runTimer();
  }
  renderCharDisplay(typed);

  const target = queue[idx].en;
  const hasError = typed.split('').some((c, i) => c !== target[i]);
  answer.classList.toggle('state-wrong', hasError && typed.length > 0);
  answer.classList.remove('state-right');

  // Live WPM
  if (startTime && typed.length > 0) {
    const elMin = (Date.now() - startTime) / 60000;
    const wpm = Math.round((typed.length / 5) / elMin);
    if (wpm < 999) sWpm.textContent = wpm;
    const wrong = typed.split('').filter((c,i)=>c!==target[i]).length;
    sAcc.textContent = Math.round(((typed.length - wrong) / typed.length) * 100) + '%';
  }
});

answer.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); checkAnswer(); }
});

// ── Check answer ──────────────────────────────────────────────────────────
function checkAnswer() {
  if (idx >= queue.length) return;
  const typed = answer.value.trim();
  const target = queue[idx].en;
  if (!typed) return;

  if (typed === target) {
    // Correct
    const elapsed = (Date.now() - startTime) / 60000;
    const wpm = Math.round((target.length / 5) / elapsed);
    sessionWpms.push(wpm);
    sessionAccs.push(100);
    correctCount++;
    allCorrect++;
    if (wpm > bestWpm) { bestWpm = wpm; document.getElementById('bestWpm').textContent = wpm; }
    document.getElementById('totalCorrect').textContent = allCorrect;

    // Visual
    answer.classList.add('state-right');
    card.classList.add('correct-glow');
    showToast('✓ 正解！', 'green');

    setTimeout(() => {
      card.classList.add('fly-out-right');
      setTimeout(() => {
        card.classList.remove('fly-out-right', 'correct-glow');
        idx++;
        startTime = null; cancelAnimationFrame(timerRaf);
        answer.value = ''; answer.className = '';
        updateProgress();
        showCard();
        answer.focus();
      }, 360);
    }, 220);

  } else {
    // Wrong
    wrongCount++;
    sessionAccs.push(Math.round((typed.split('').filter((c,i)=>c===target[i]).length / target.length) * 100));
    card.classList.add('shake');
    card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
    showToast('✗ もう一度！ → ' + target, 'red');
    answer.classList.add('state-wrong');
    setTimeout(() => { answer.value = ''; answer.className = ''; renderCharDisplay(''); }, 600);
  }
}

// ── Timer RAF ─────────────────────────────────────────────────────────────
function runTimer() {
  const tick = () => {
    if (!startTime) return;
    sTime.textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
    timerRaf = requestAnimationFrame(tick);
  };
  timerRaf = requestAnimationFrame(tick);
}

// ── Progress ──────────────────────────────────────────────────────────────
function updateProgress() {
  const pct = queue.length ? (idx / queue.length) * 100 : 0;
  progFill.style.width = pct + '%';
  progLabel.textContent = idx + ' / ' + queue.length;
}

// ── Hint ──────────────────────────────────────────────────────────────────
document.getElementById('hintBtn').addEventListener('click', () => {
  if (idx >= queue.length) return;
  hintShown = true;
  cardSub.textContent = '💡 ' + queue[idx].hint;
});

// ── Skip ──────────────────────────────────────────────────────────────────
document.getElementById('skipBtn').addEventListener('click', () => {
  if (idx >= queue.length) return;
  cancelAnimationFrame(timerRaf);
  startTime = null;
  card.classList.add('fly-out-wrong');
  setTimeout(() => {
    card.classList.remove('fly-out-wrong');
    idx++;
    answer.value = ''; answer.className = '';
    updateProgress();
    showCard();
    answer.focus();
  }, 360);
});

document.getElementById('nextSetBtn').addEventListener('click', initSession);
document.getElementById('restartBtn').addEventListener('click', () => {
  complete.classList.remove('show');
  initSession();
});

// ── Complete ──────────────────────────────────────────────────────────────
function showComplete() {
  cancelAnimationFrame(timerRaf);
  const avgWpm = sessionWpms.length ? Math.round(sessionWpms.reduce((a,b)=>a+b,0)/sessionWpms.length) : 0;
  const avgAcc = sessionAccs.length ? Math.round(sessionAccs.reduce((a,b)=>a+b,0)/sessionAccs.length) : 0;
  const totalSec = sessionStartTime ? ((Date.now() - sessionStartTime)/1000).toFixed(1) : '0.0';

  document.getElementById('compWpm').textContent  = avgWpm;
  document.getElementById('compAcc').textContent  = avgAcc + '%';
  document.getElementById('compTime').textContent = totalSec + 's';

  let emoji = '🎉', title = 'セット完了！', rankText = '', rankColor = '';
  if (avgAcc >= 95 && avgWpm >= 40) { emoji='🏆'; title='パーフェクト！'; rankText='Sランク'; rankColor='#FFD166'; }
  else if (avgAcc >= 85) { emoji='✨'; title='よくできました！'; rankText='Aランク'; rankColor='#06D6A0'; }
  else if (avgAcc >= 70) { emoji='👍'; title='いい調子！'; rankText='Bランク'; rankColor='#4361EE'; }
  else { emoji='💪'; title='もっと練習しよう！'; rankText='Cランク'; rankColor='#EF476F'; }

  document.getElementById('compEmoji').textContent = emoji;
  document.getElementById('compTitle').textContent = title;
  document.getElementById('compSub').textContent   = `正解 ${correctCount} / ${queue.length} 問`;
  const rankEl = document.getElementById('compRank');
  rankEl.textContent = rankText;
  rankEl.style.background = rankColor + '22';
  rankEl.style.color = rankColor;
  rankEl.style.border = '2px solid ' + rankColor;

  complete.classList.add('show');
}

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  toastTimer = setTimeout(() => { toast.className = 'toast'; }, 1600);
}

// ── Shuffle ───────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ── Start ─────────────────────────────────────────────────────────────────
initSession();
</script>
