<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS/HTML 英単語タイピング</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Top bar -->
<div class="topbar">
  <a class="site-title" href="dictionary.html" style="text-decoration:none;cursor:pointer;">CSS/HTML <span>英単語タイピング</span></a>
  <div class = "explain">←単語を覚えるならこちらをクリック</div>
  <div class="topbar-stats">
    <div class="tstat">正解数 <strong id="totalCorrect">0</strong></div>
    <div class="tstat">ベストWPM <strong id="bestWpm">—</strong></div>
  </div>
</div>

<!-- Category pills -->
<main>
  <div class="cat-row" id="catRow">
    <button class="cat-pill active" data-cat="easy">まずはここから</button>
    <button class="cat-pill" data-cat="mc7">マインクラフト#7</button>
    <button class="cat-pill" data-cat="position">配置に関する単語</button>
    <button class="cat-pill" data-cat="css-prop">CSSプロパティ</button>
    <button class="cat-pill" data-cat="html">HTMLタグ</button>
    <button class="cat-pill" data-cat="selector">セレクタ</button>
    <button class="cat-pill" data-cat="css-val">CSS値・単位</button>
    <button class="cat-pill" data-cat="test">※先生が試運転する用</button>
  </div>

  <!-- 単語数スライダー -->
  <div class="count-row" id="countRow">
    <span class="count-label">出題数：<strong id="countVal">10</strong>問</span>
    <input type="range" id="countSlider" min="1" max="10" value="10" step="1">
    <span class="count-hint" id="countHint">（全<span id="totalWords">10</span>問）</span>
  </div>

  <!-- Mode selector は削除 -->
  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
    <div class="progress-label" id="progLabel">0 / 0</div>
  </div>

  <!-- Card -->
  <div class="card-stage" id="cardStage">
    <div class="card fly-in" id="card">
      <div class="card-category" id="cardCat">—</div>
      <div class="card-hint" id="cardHint">読み込み中…</div>
      <div class="card-sub" id="cardSub"></div>
    </div>
  </div>

  <!-- Char display -->
  <div class="char-display-wrap">
    <div class="char-display" id="charDisplay"></div>
    <!-- auto hint countdown -->
    <div class="auto-hint-wrap" id="autoHintWrap">
      <div class="countdown-ring" id="countdownRing">
        <svg width="20" height="20" viewBox="0 0 20 20">
          <circle class="track" cx="10" cy="10" r="8"/>
          <circle class="fill"  cx="10" cy="10" r="8" id="countdownArc"/>
        </svg>
      </div>
      <span id="autoHintLabel">3秒後にヒントを表示…</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
      <div class="reveal-badge" id="hintBadge">
        <span class="key">Ctrl</span> でヒント
      </div>
      <div class="reveal-badge" id="revealBadge">
        <span class="key">Ctrl</span><span style="color:var(--muted);font-size:10px">+</span><span class="key">Shift</span> で答え
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-block">
    <div class="input-wrap">
      <input type="text" id="answer" autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false"
             placeholder="英語で入力してください">
      <span class="enter-hint">Enter ↵</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><span class="val" ><button class="action-btn" id="hintBtn">💡Hint</button></div>
    <div class="stat-card">
      <input type="range" min="0" max="1" step="1" value="0" id="showSpell">
      <label class="lbl">答えのスペルを表示しますか？</label>
    </div>
    <div class="stat-card"><span class="val" id="sWpm">—</span><span class="lbl">WPM</span></div>
    <div class="stat-card"><span class="val" id="sAcc">—</span><span class="lbl">正解率</span></div>
    <div class="stat-card"><span class="val" id="sTime">0.0s</span><span class="lbl">経過時間</span></div>
  </div>

  <!-- Actions -->
  <!-- <div class="action-row">
    <button class="action-btn" id="hintBtn">💡 ヒント <small style="font-size:10px;opacity:.7">Shift</small></button>
    <button class="action-btn" id="skipBtn">スキップ ⏭</button>
    <button class="action-btn primary" id="nextSetBtn">次のセット →</button>
  </div> -->

  <!-- Complete -->
  <div class="complete" id="complete">
    <div class="complete-emoji" id="compEmoji">🎉</div>
    <div class="complete-title" id="compTitle">セット完了！</div>
    <div class="complete-sub" id="compSub"></div>
    <div class="complete-stats">
      <div class="cs"><span class="v" id="compWpm">—</span><span class="l">平均 WPM</span></div>
      <div class="cs"><span class="v" id="compAcc">—</span><span class="l">正解率</span></div>
      <div class="cs"><span class="v" id="compTime">—</span><span class="l">合計時間</span></div>
    </div>
    <div class="rank" id="compRank"></div>
    <button class="action-btn primary" id="restartBtn" style="max-width:200px">もう一度 ↺</button>
  </div>

  <!-- 間違い解説パネル -->
  <div class="review-panel" id="reviewPanel"></div>

</main>
<script type="module" src="js/main.js"></script>
<script>
  const showSpell = document.getElementById("showSpell");
  const label = document.querySelector(".stat-card .lbl");

  showSpell.addEventListener("input", () => {
    if (showSpell.value === "1") {
      label.textContent = "スペル表示中";
      label.classList.add("active");
    } else {
      label.textContent = "答えのスペルを表示しますか？";
      label.classList.remove("active");
    }
  });
</script>
</body>
</html>
