<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語帳 — CSS/HTML 英単語タイピング</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #FDFCF8;
  --paper:    #FFFFFF;
  --border:   #E8E4D8;
  --text:     #1A1A2E;
  --muted:    #8B8576;
  --blue:     #4361EE;
  --green:    #06D6A0;
  --red:      #EF476F;
  --yellow:   #FFD166;
  --purple:   #8B5CF6;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
}

/* ── Top bar ── */
.topbar {
  width: 100%;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 20;
}
.site-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--blue);
  text-decoration: none;
}
.site-title span { color: var(--text); }
.back-link {
  margin-left: auto;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 99px;
  border: 1.5px solid var(--border);
  transition: all 0.15s;
}
.back-link:hover { border-color: var(--blue); color: var(--blue); }

/* ── Hero ── */
.hero {
  max-width: 880px;
  margin: 0 auto;
  padding: 56px 24px 28px;
}
.hero-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 12px;
}
.hero h1 {
  font-size: 34px;
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1.3;
  margin-bottom: 12px;
}
.hero p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.8;
  max-width: 60ch;
}

/* ── Layout: TOC + content ── */
.layout {
  max-width: 880px;
  margin: 0 auto;
  padding: 24px 24px 80px;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 32px;
  align-items: start;
}
@media (max-width: 720px) {
  .layout { grid-template-columns: 1fr; }
  .toc { display: none; }
}

.toc {
  position: sticky;
  top: 90px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.toc-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.toc-link {
  font-size: 13px;
  color: var(--muted);
  text-decoration: none;
  padding: 7px 10px;
  border-radius: 7px;
  border-left: 2px solid transparent;
  transition: all 0.15s;
}
.toc-link:hover { color: var(--blue); background: rgba(67,97,238,0.05); }
.toc-link .count { font-size: 11px; color: var(--border); margin-left: 4px; }

/* ── Content ── */
.content { min-width: 0; }

.cat-section { margin-bottom: 48px; scroll-margin-top: 90px; }
.cat-section-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--text);
}
.cat-section-head h2 {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: -0.01em;
}
.cat-section-head .cat-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

/* ── Word entry (dictionary style, always expanded) ── */
.entry {
  border: 1.5px solid var(--border);
  border-radius: 14px;
  background: var(--paper);
  margin-bottom: 14px;
  overflow: hidden;
}

.entry-head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(67,97,238,0.025);
}
.entry-word {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
}
.entry-ja {
  font-size: 13px;
  color: var(--muted);
  flex: 1;
}

/* ── Detail (always visible) ── */
.entry-detail {
  padding: 16px 18px;
}

.detail-block { margin-bottom: 14px; }
.detail-block:last-child { margin-bottom: 0; }
.detail-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.morphemes { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.morph { display: inline-flex; flex-direction: column; align-items: center; gap: 2px; }
.morph-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
}
.morph-meaning { font-size: 10px; color: var(--muted); }
.morph-sep { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--border); }
.m-blue   .morph-text { background: rgba(67,97,238,0.1);  color: var(--blue); }
.m-green  .morph-text { background: rgba(6,214,160,0.1);  color: #059c74; }
.m-red    .morph-text { background: rgba(239,71,111,0.1); color: var(--red); }
.m-yellow .morph-text { background: rgba(255,209,102,0.22); color: #9a7200; }
.m-purple .morph-text { background: rgba(139,92,246,0.1); color: var(--purple); }

.etymology {
  font-size: 13px;
  line-height: 1.75;
  color: var(--text);
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 8px;
  border-left: 3px solid var(--blue);
}
.code-block {
  background: #1A1A2E;
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.8;
  overflow-x: auto;
  color: #abb2bf;
  white-space: pre;
}
.memo {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  padding: 10px 12px;
  background: rgba(255,209,102,0.1);
  border-radius: 8px;
  border-left: 3px solid var(--yellow);
}
.hint-only {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
}

/* ── Footer ── */
footer {
  text-align: center;
  padding: 32px 24px 48px;
  font-size: 12px;
  color: var(--border);
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <a class="site-title" href="index.html">CSS/HTML <span>英単語タイピング</span></a>
  <a class="back-link" href="index.html">← 練習に戻る</a>
</div>

<!-- Hero -->
<div class="hero">
  <div class="hero-eyebrow">Glossary / 単語帳</div>
  <h1>すべての出題語の<br>意味と成り立ちを読む</h1>
  <p>タイピング練習に出てくる英単語を、語源・CSS/HTMLでの使われ方・覚え方つきで一覧にまとめました。カテゴリごとに上から順に読んでいくだけで、出題範囲をすべて確認できます。</p>
</div>

<!-- Layout -->
<div class="layout">
  <nav class="toc" id="toc">
    <div class="toc-title">カテゴリ</div>
    <!-- generated -->
  </nav>

  <div class="content" id="content">
    <!-- generated -->
  </div>
</div>

<footer>CSS/HTML 英単語タイピング — 単語帳</footer>

<script type="module">
import { BANKS } from './js/bank.js';

const toc     = document.getElementById('toc');
const content = document.getElementById('content');

const COLORS = ['m-blue','m-green','m-red','m-yellow','m-purple'];

function slug(catKey) { return 'cat-' + catKey; }

// ── TOC 生成 ──────────────────────────────────────────────────────────────
Object.entries(BANKS).forEach(([key, bank]) => {
  const a = document.createElement('a');
  a.className = 'toc-link';
  a.href = '#' + slug(key);
  a.innerHTML = `${bank.label} <span class="count">${bank.items.length}</span>`;
  toc.appendChild(a);
});

// ── 本文生成（すべて常時展開）────────────────────────────────────────────
Object.entries(BANKS).forEach(([key, bank]) => {
  const section = document.createElement('section');
  section.className = 'cat-section';
  section.id = slug(key);

  section.innerHTML = `
    <div class="cat-section-head">
      <h2>${bank.label}</h2>
      <span class="cat-count">${bank.items.length}語</span>
    </div>
  `;

  bank.items.forEach(item => {
    const entry = document.createElement('div');
    entry.className = 'entry';

    const head = document.createElement('div');
    head.className = 'entry-head';
    head.innerHTML = `
      <span class="entry-word">${escapeHtml(item.en)}</span>
      <span class="entry-ja">${escapeHtml(item.ja)}</span>
    `;
    entry.appendChild(head);

    const detail = document.createElement('div');
    detail.className = 'entry-detail';
    if (item.exp && typeof item.exp === 'object') {
      detail.innerHTML = buildDetailHtml(item.exp);
    } else if (item.hint) {
      detail.innerHTML = `<div class="hint-only">${escapeHtml(item.hint)}</div>`;
    } else {
      detail.innerHTML = `<div class="hint-only">（解説なし）</div>`;
    }
    entry.appendChild(detail);

    section.appendChild(entry);
  });

  content.appendChild(section);
});

function buildDetailHtml(exp) {
  let html = '';

  if (exp.morphemes && exp.morphemes.length) {
    let m = '<div class="morphemes">';
    exp.morphemes.forEach((mo, i) => {
      if (i > 0) m += '<span class="morph-sep">+</span>';
      const c = COLORS[i % COLORS.length];
      m += `<div class="morph ${c}">
        <div class="morph-text">${escapeHtml(mo.text)}</div>
        <div class="morph-meaning">${escapeHtml(mo.meaning)}</div>
      </div>`;
    });
    m += '</div>';
    html += `<div class="detail-block">
      <div class="detail-label">🔤 語の成り立ち</div>${m}
    </div>`;
  }

  if (exp.etymology) {
    html += `<div class="detail-block">
      <div class="detail-label">📖 意味・解説</div>
      <div class="etymology">${escapeHtml(exp.etymology)}</div>
    </div>`;
  }

  if (exp.code) {
    html += `<div class="detail-block">
      <div class="detail-label">💻 コード例</div>
      <div class="code-block">${escapeHtml(exp.code)}</div>
    </div>`;
  }

  if (exp.memo) {
    html += `<div class="detail-block">
      <div class="detail-label">💡 覚え方のポイント</div>
      <div class="memo">${escapeHtml(exp.memo)}</div>
    </div>`;
  }

  return html;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
</script>
</body>
</html>
